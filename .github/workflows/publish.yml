name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm manual release"
        required: true

jobs:
  test:
    name: Run tests before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/clawforge/
    permissions:
      id-token: write   # required for OIDC trusted publisher

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Dual-mode publishing:
      #
      # Mode A — OIDC Trusted Publisher (preferred, no stored secrets):
      #   Set up once at https://pypi.org/manage/account/publishing/
      #   Leave the PYPI_TOKEN secret unset; the action uses OIDC automatically.
      #   See RELEASING.md §OIDC Setup for exact field values.
      #
      # Mode B — API token fallback:
      #   Create a PyPI token at https://pypi.org/manage/account/token/
      #   Add it as repo secret PYPI_TOKEN in Settings → Secrets → Actions.
      #   The action prefers the token over OIDC when the input is non-empty.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
